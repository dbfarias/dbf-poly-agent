services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: polybot-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: polybot-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    container_name: polybot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-data:/etc/letsencrypt:ro
    depends_on:
      - app
      - frontend

volumes:
  bot-data:
  certbot-data:
