# Local development stack -- builds images from source.
# Usage: docker compose up --build
# For production (pre-built images from GHCR), use docker-compose.prod.yml
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: polybot-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_KEY: ${API_SECRET_KEY}
    container_name: polybot-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    container_name: polybot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - frontend

volumes:
  bot-data:
