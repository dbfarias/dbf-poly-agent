name: CI/CD

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "scripts/**"
      - "img/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "scripts/**"
      - "img/**"
      - ".gitignore"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check bot/ api/

      - name: Test
        env:
          API_SECRET_KEY: test-key-32chars-long-enough-xx
        run: pytest tests/ -v --tb=short

  build-and-push:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bot
          push: true
          tags: ${{ env.REGISTRY }}/dbfarias/polybot-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ env.REGISTRY }}/dbfarias/polybot-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            VITE_API_KEY=${{ secrets.API_SECRET_KEY }}

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Check server reachability
        id: check
        run: |
          if nc -z -w 10 "$SERVER_HOST" 22 2>/dev/null; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Server $SERVER_HOST:22 is not reachable — skipping deploy"
            echo "reachable=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}

      - name: Sync config to server
        if: steps.check.outputs.reachable == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/,docker-compose.prod.yml"
          target: "~/polybot"

      - name: Backup DB before deploy
        if: steps.check.outputs.reachable == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            bash ~/polybot/deploy/scripts/backup.sh || echo "Backup skipped (first deploy?)"

      - name: Deploy to Lightsail
        if: steps.check.outputs.reachable == 'true'
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 60s
          command_timeout: 10m
          envs: GHCR_TOKEN
          script: |
            set -e
            cd ~/polybot
            echo "$GHCR_TOKEN" | docker login ghcr.io -u dbfarias --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            sleep 5
            docker compose -f docker-compose.prod.yml logs --tail=30 app
