# Set GITHUB_OWNER env var to your GitHub username before running:
#   export GITHUB_OWNER=yourusername
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
services:
  app:
    image: ghcr.io/${GITHUB_OWNER:-yourusername}/polybot-app:latest
    container_name: polybot-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/${GITHUB_OWNER:-yourusername}/polybot-frontend:latest
    container_name: polybot-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    container_name: polybot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - app
      - frontend

volumes:
  bot-data:
  certbot-www:
